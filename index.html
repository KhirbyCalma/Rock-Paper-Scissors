<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rock, Paper, Scissors</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
        <script src="script.js" defer></script>
    </head>
    <body>
        <header>
            <h1>Rock&#9994;, Paper&#9995;, Scissors&#9996;!</h1>
        </header>
        <main>
            <section class="results-section">
                <h2>Results</h2>
                <section class="numerical-scores">
                    <h3 id="player-score">Your Score: 0</h3>
                    <h3 id="computer-score">Computer's Score: 0</h3>                      
                </section>
                <section class="result-output">
                    <p id="result-text">Select a move to start the game! First to 5 wins.</p>
                </section>
            </section>
            <section class="game-section">
                <section class="player">
                    <h2>You</h2>
                    <section class="choices">
                        <button type="button" id="rock-button">Rock&#9994;</button>
                        <button type="button" id="paper-button">Paper&#9995;</button>
                        <button type="button" id="scissor-button">Scissor&#9996;</button>
                    </section>
                </section>
                <section class="computer">
                    <h2>Computer</h2>
                    <section class="choices">
                        <p>Rock&#9994;</p>
                        <p>Paper&#9995;</p>
                        <p>Scissor&#9996;</p>
                    </ul>
                </section>
            </section>
        </main>
        <footer>
            <p>Copyright &copy; Khirby Calma, 2023</p>
        </footer>
    </body>
</html>

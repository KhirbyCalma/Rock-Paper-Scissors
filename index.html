<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rock, Paper, Scissors</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
        <script src="script.js"></script>
    </head>
    <body>
        <header>
            <h1>Rock, Paper, Scissors!</h1>
        </header>
        <main>
            <section class="game">
                <section class="player">
                    <h2>You</h2>
                    <section class="choices">
                        <section class="rock">
                            <h3>Rock</h3>
                            <button type="button" id="rock-button">
                                <!--source: http://www.stickpng.com/img/nature/rocks/huge-rock-->
                                <img src="./images/rock.png" alt="Rock" class="choice-img">
                            </button>
                        </section>
                        <section class="paper">
                            <h3>Paper</h3>
                            <button type="button" id="paper-button">
                                <!--source: http://www.stickpng.com/img/miscellaneous/paper/stack-of-paper-->
                                <img src="./images/paper.png" alt="Paper" class="choice-img">
                            </button>
                        </section>
                        <section class="scissor">
                            <h3>Scissor</h3>
                            <button type="button" id="scissor-button">
                                <!--source: https://purepng.com/photo/20929/objects-scissors-->
                                <img src="./images/scissor.png" alt="Scissor" class="choice-img">
                            </button>
                        </section>
                    </section>
                </section>
                <section class="computer">
                    <h2>Computer</h2>
                    <section class="choices">
                        <section class="rock">
                            <h3>Rock</h3>
                            <!--source: http://www.stickpng.com/img/nature/rocks/huge-rock-->
                            <img src="./images/rock.png" alt="Rock" class="choice-img">
                        </section>
                        <section class="paper">
                            <h3>Paper</h3>
                            <!--source: http://www.stickpng.com/img/miscellaneous/paper/stack-of-paper-->
                            <img src="./images/paper.png" alt="Paper" class="choice-img">
                        </section>
                        <section class="scissor">
                            <h3>Scissor</h3>
                            <!--source: https://purepng.com/photo/20929/objects-scissors-->
                            <img src="./images/scissor.png" alt="Scissor" class="choice-img">
                        </section>
                    </section>
                </section>
            </section>
            <section class="results">
                <h2>Results</h2>
            </section>
        </main>
    </body>
</html>

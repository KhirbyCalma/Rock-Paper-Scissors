<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rock, Paper, Scissors</title>
        <link rel="stylesheet" href="./styles/reset.css">
        <link rel="stylesheet" href="./styles/style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/js-confetti@latest/dist/js-confetti.browser.js"></script>
        <script src="script.js" defer></script>
    </head>
    <body>
        <header>
            <h1>ROCK&#9994;, PAPER&#9995;, SCISSORS&#9996;!</h1>
        </header>
        <main>
            <canvas id="confetti-effect"></canvas>

            <section class="computer">
                <h2>COMPUTER</h2>
                <h3 id="computer-move">&#10067;</h2>
                <h3 id="computer-score">0</h3>    
            </section>

            <section class="move-and-result">
                <h2 id="result">First to 5 wins.</h2>
                <div class="player-moveset">
                    <button type="button" class="player-move-selection">&#9994;</button>
                    <button type="button" class="player-move-selection">&#9995;</button>
                    <button type="button" class="player-move-selection">&#9996;</button>
                </div>
            </section>

            <section class="player">
                <h2>PLAYER</h2>
                <h3 id="player-move">&#10067;</h2>   
                <h3 id="player-score">0</h3>
            </section>
        </main>
        <footer>
            Copyright &copy; Khirby Calma, <script>document.write(new Date().getFullYear());</script>
        </footer>
    </body>
</html>
